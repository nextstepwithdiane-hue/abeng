<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>San Jacinto Assisted Living, LLC</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    line-height: 1.6;
  }

  /* Logo styling - center and resize if needed */
  .logo {
    display: block;
    margin: 20px auto;
    max-width: 200px;
    height: auto;
  }

  /* Top image full width */
  .top-image {
    width: 100%;
    display: block;
  }

  /* Header section */
  header {
    background-color: #f4f4f4;
    padding: 20px;
    text-align: center;
  }

  /* Address styles */
  .address {
    margin-top: 10px;
    font-size: 1.2em;
  }

  /* Schedule button styles */
  .schedule-btn {
    display: inline-block;
    background-color: yellow;
    color: #000;
    padding: 15px 30px;
    font-size: 1.2em;
    font-weight: bold;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 20px;
    transition: background-color 0.3s;
  }

  .schedule-btn:hover {
    background-color: #ffd700;
  }

  /* Facility section styles */
  .facility-section {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 20px;
  }

  .facility {
    flex: 1 1 45%;
    position: relative;
  }

  .facility img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
  }

  /* Facility caption overlay if needed */
  .facility-caption {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    padding: 5px 10px;
    border-radius: 3px;
  }

  /* Make sure images in facility are full width and no whitespace */
  @media(max-width: 768px){
    .facility {
      flex: 1 1 100%;
    }
  }
</style>
</head>
<body>

<!-- Logo -->
<img src="your-logo-url.png" alt="San Jacinto Assisted Living Logo" class="logo" />

<!-- Full width top image -->
<img src="top-image.jpg" alt="Assisted Living" class="top-image" />

<!-- Header with address -->
<header>
  <h1>San Jacinto Assisted Living, LLC</h1>
  <div class="address">
    1234 Example Street, City, State ZIP
  </div>
  <!-- Schedule Tour Button -->
  <a href="#schedule" class="schedule-btn">Schedule a Tour</a>
</header>

<!-- Facility Section -->
<section class="facility-section">
  <div class="facility">
    <img src="facility1.jpg" alt="Facility 1" />
    <!-- Add caption if needed -->
  </div>
  <div class="facility">
    <img src="facility2.jpg" alt="Facility 2" />
  </div>
  <div class="facility">
    <img src="facility3.jpg" alt="Facility 3" />
  </div>
  <!-- Add more images as needed -->
</section>

<!-- Additional content as needed -->

</body>
</html>
